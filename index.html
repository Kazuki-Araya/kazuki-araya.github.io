  secretMusic.loop = true;
  secretMusic.play();

  const sakuraCanvas = document.createElement("canvas");
  sakuraCanvas.style.position="fixed";
  sakuraCanvas.style.inset="0";
  sakuraCanvas.style.zIndex="99998";
  sakuraCanvas.style.pointerEvents="none";
  document.body.appendChild(sakuraCanvas);

  const ctx = sakuraCanvas.getContext("2d");
  sakuraCanvas.width = window.innerWidth;
  sakuraCanvas.height = window.innerHeight;

  let petals = [];

  function createPetal(){
    petals.push({
      x: Math.random()*sakuraCanvas.width,
      y: -20,
      size: Math.random()*6+4,
      speed: Math.random()*2+1,
      drift: Math.random()*2-1
    });
  }

  function animatePetals(){
    ctx.clearRect(0,0,sakuraCanvas.width,sakuraCanvas.height);
    petals.forEach((p,i)=>{
      p.y += p.speed;
      p.x += p.drift;
      ctx.fillStyle="pink";
      ctx.beginPath();
      ctx.arc(p.x,p.y,p.size,0,Math.PI*2);
      ctx.fill();
      if(p.y > sakuraCanvas.height){
        petals.splice(i,1);
      }
    });
    requestAnimationFrame(animatePetals);
  }

  const petalInterval = setInterval(createPetal,200);
  animatePetals();

  let overlay=document.createElement("div");
  overlay.style.position="fixed";
  overlay.style.inset="0";
  overlay.style.display="flex";
  overlay.style.justifyContent="center";
  overlay.style.alignItems="center";
  overlay.style.zIndex="99999";
  overlay.style.background="linear-gradient(rgba(0,0,0,0.8),rgba(255,105,180,0.4))";
  overlay.style.backdropFilter="blur(15px)";

    <button id="closeSecret"

function startFireworks(){

  const fireCanvas = document.createElement("canvas");
  fireCanvas.style.position="fixed";
  fireCanvas.style.inset="0";
  fireCanvas.style.pointerEvents="none";
  fireCanvas.style.zIndex="99999";
  document.body.appendChild(fireCanvas);

  const fctx = fireCanvas.getContext("2d");
  fireCanvas.width = window.innerWidth;
  fireCanvas.height = window.innerHeight;

  let particles=[];

  function createFirework(x,y){
    for(let i=0;i<80;i++){
      particles.push({
        x:x,
        y:y,
        speed:Math.random()*5+2,
        angle:Math.random()*Math.PI*2,
        radius:Math.random()*3+1,
        alpha:1
      });
    }
  }

  function animateFire(){
    fctx.clearRect(0,0,fireCanvas.width,fireCanvas.height);

    particles.forEach((p,index)=>{
      p.x += Math.cos(p.angle)*p.speed;
      p.y += Math.sin(p.angle)*p.speed;
      p.alpha -= 0.02;

      fctx.globalAlpha = p.alpha;
      fctx.beginPath();
      fctx.arc(p.x,p.y,p.radius,0,Math.PI*2);
      fctx.fillStyle = "hsl("+Math.random()*360+",100%,60%)";
      fctx.fill();

      if(p.alpha<=0){
        particles.splice(index,1);
      }
    });

    requestAnimationFrame(animateFire);
  }

  animateFire();

  let fireInterval=setInterval(()=>{
    createFirework(
      Math.random()*fireCanvas.width,
      Math.random()*fireCanvas.height/2
    );
  },500);

  setTimeout(()=>{
    clearInterval(fireInterval);
    setTimeout(()=>fireCanvas.remove(),3000);
  },15000);
}

</script>
